# Deploy a temporary preview of the landing site for each PR.
name: Deploy to Firebase Hosting on PR
on:
  pull_request:
    paths:
      - "landing/**"
permissions:
  checks: write
  contents: read
  pull-requests: write
jobs:
  build_and_preview:
    if: ${{ github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: landing
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: landing/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      # Stamp a unique marker so the preview build never matches the live
      # version (firebase-tools#6789 FAILED_PRECONDITION dedup).
      - name: Stamp build version
        run: echo "${{ github.sha }} ${{ github.run_id }}-${{ github.run_attempt }}" > dist/build-version.txt

      - name: Deploy preview
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_AIGATEWAY_001 }}
          projectId: aigateway-001
          entryPoint: ./landing

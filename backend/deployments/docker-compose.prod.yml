name: ai-gateway-prod

x-logging: &json-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "5"

services:

  # ── Frontend (builds React app + serves as nginx entry point) ───────────
  # nginx.conf is mounted at runtime so it can proxy /v1/ and /api/ to gateway
  # without rebuilding the image. Static files are baked into the image.
  frontend:
    build:
      context: ../../frontend
      dockerfile: Dockerfile
    ports:
      - "8083:80"
      # Uncomment and configure TLS termination when you add certificates:
      # - "443:443"
    depends_on:
      gateway:
        condition: service_healthy
    restart: always
    logging: *json-logging
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://127.0.0.1/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ── Gateway ───────────────────────────────────────────────────────────────
  gateway:
    build:
      context: ..
      dockerfile: Dockerfile
    expose:
      - "8080"   # OpenAI-compatible proxy — internal only, nginx proxies it
      - "8081"   # Admin API — internal only, nginx proxies /api/
    environment:
      ENV: prod
      PROXY_PORT: "8080"
      ADMIN_PORT: "8081"
      OTEL_SERVICE_NAME: ${OTEL_SERVICE_NAME:-ai-gateway}
      OTEL_COLLECTOR_ADDR: otel-collector:4317
      REDIS_ADDR: redis:6379
      POSTGRES_DSN: postgres://${POSTGRES_USER:-gateway}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-gateway}?sslmode=disable
      CLICKHOUSE_ADDR: clickhouse:9000
      CLICKHOUSE_USER: ${CLICKHOUSE_USER:-otel}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-otel}
      CLICKHOUSE_DB: ${CLICKHOUSE_DB:-otel}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@example.com}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-649NB7B/83I=}
      JWT_SECRET: ${JWT_SECRET}
      UPSTREAM_0_KEY_ID: ${UPSTREAM_0_KEY_ID}
      UPSTREAM_0_MODEL: ${UPSTREAM_0_MODEL:-gpt-5.4}
      UPSTREAM_0_BASE_URL: ${UPSTREAM_0_BASE_URL:-https://api.openai.com}
      UPSTREAM_0_API_KEY: ${UPSTREAM_0_API_KEY}
    depends_on:
      clickhouse:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      otel-collector:
        condition: service_started
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 256M
    restart: always
    logging: *json-logging
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8081/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s

  # ── Postgres ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-gateway}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-gateway}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    expose:
      - "5432"
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          cpus: '0.25'
          memory: 256M
    restart: always
    logging: *json-logging
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-gateway} -d ${POSTGRES_DB:-gateway}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Redis ─────────────────────────────────────────────────────────────────
  redis:
    image: redis:8-alpine
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis_data:/data
    expose:
      - "6379"
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.1'
          memory: 128M
    restart: always
    logging: *json-logging
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── ClickHouse ────────────────────────────────────────────────────────────
  clickhouse:
    image: clickhouse/clickhouse-server:25.12
    environment:
      CLICKHOUSE_DB: ${CLICKHOUSE_DB:-otel}
      CLICKHOUSE_USER: ${CLICKHOUSE_USER:-otel}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-otel}
    expose:
      - "8123"
      - "9000"
    volumes:
      - clickhouse_data:/var/lib/clickhouse
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 2G
        reservations:
          cpus: '0.25'
          memory: 512M
    restart: always
    logging: *json-logging
    healthcheck:
      test: ["CMD-SHELL", "clickhouse-client --user ${CLICKHOUSE_USER:-otel} --password ${CLICKHOUSE_PASSWORD:-otel} --query 'SELECT 1'"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ── OTel Collector ────────────────────────────────────────────────────────
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.150.1
    # Config is passed inline via env var — no file mount needed (Portainer-safe)
    command: ["--config=env:OTEL_CONFIG"]
    environment:
      OTEL_CONFIG: |
        receivers:
          otlp:
            protocols:
              grpc:
                endpoint: 0.0.0.0:4317
              http:
                endpoint: 0.0.0.0:4318
        processors:
          batch:
            timeout: 5s
            send_batch_size: 512
          filter/health:
            error_mode: ignore
            traces:
              span:
                - 'attributes["http.target"] == "/health"'
                - 'attributes["http.target"] == "/ready"'
                - 'attributes["url.path"] == "/health"'
                - 'attributes["url.path"] == "/ready"'
        exporters:
          otlp/jaeger:
            endpoint: jaeger:4317
            tls:
              insecure: true
          clickhouse:
            endpoint: tcp://clickhouse:9000?dial_timeout=10s&compress=lz4
            database: ${CLICKHOUSE_DB:-otel}
            username: ${CLICKHOUSE_USER:-otel}
            password: ${CLICKHOUSE_PASSWORD:-otel}
            ttl: 720h
            logs_table_name: otel_logs
            traces_table_name: otel_traces
            create_schema: true
            timeout: 5s
            retry_on_failure:
              enabled: true
              initial_interval: 5s
              max_interval: 30s
              max_elapsed_time: 300s
        extensions:
          health_check:
            endpoint: 0.0.0.0:13133
        service:
          extensions: [health_check]
          pipelines:
            traces:
              receivers:  [otlp]
              processors: [batch, filter/health]
              exporters:  [otlp/jaeger, clickhouse]
            logs:
              receivers:  [otlp]
              processors: [batch]
              exporters:  [clickhouse]
    expose:
      - "4317"
      - "4318"
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
    restart: always
    logging: *json-logging
    depends_on:
      - jaeger
      - clickhouse

  # ── Jaeger (trace UI — bind to localhost or add nginx auth to expose) ─────
  jaeger:
    image: cr.jaegertracing.io/jaegertracing/jaeger:2.17.0
    user: root
    environment:
      SPAN_STORAGE_TYPE: badger
      BADGER_EPHEMERAL: "false"
      BADGER_DIRECTORY_VALUE: /badger/data
      BADGER_DIRECTORY_KEY: /badger/key
      BADGER_SPAN_STORE_TTL: "72h"
    expose:
      - "16686"
      - "4317"
    volumes:
      - jaeger_data:/badger
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
    restart: always
    logging: *json-logging

volumes:
  postgres_data:
  redis_data:
  jaeger_data:
  clickhouse_data:

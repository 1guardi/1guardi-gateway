name: ai-gateway

services:
  # ── ML Runner (inference sidecar) ─────────────────────────────────────────────
  mlrunner:
    profiles: ["backend", "infra"]
    build:
      context: ../services/mlrunner
    ports:
      - "8082:8082"
    environment:
      # Mount a different YAML to swap models without rebuilding.
      ANALYZERS_CONFIG: /config/analyzers.yml
    volumes:
      - ../services/mlrunner/analyzers.yml:/config/analyzers.yml:ro
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2G
        reservations:
          cpus: "0.5"
          memory: 1G
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'python -c "import urllib.request; urllib.request.urlopen(''http://localhost:8082/health'')"',
        ]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 60s
    restart: unless-stopped

  # ── Gateway ──────────────────────────────────────────────────────────────────
  gateway:
    profiles: ["backend"]
    build:
      context: ..
      dockerfile: Dockerfile
    ports:
      - "8080:8080" # OpenAI-compatible proxy — expose to clients
      - "8081:8081" # Admin API — keep internal in production
    env_file:
      - ../.env
    environment:
      OTEL_COLLECTOR_ADDR: otel-collector:4317
      REDIS_ADDR: redis:6379
      POSTGRES_DSN: postgres://gateway:gateway@postgres:5432/gateway?sslmode=disable
      CLICKHOUSE_ADDR: clickhouse:9000
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: otel
      CLICKHOUSE_DB: otel
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@example.com}
      JWT_SECRET: ${JWT_SECRET}
      MLRUNNER_BASE_URL: http://mlrunner:8082
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      otel-collector:
        condition: service_started
      mlrunner:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1G
        reservations:
          cpus: "0.5"
          memory: 512M
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8081/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ── Postgres ──────────────────────────────────────────────────────────────────
  postgres:
    profiles: ["infra"]
    image: postgres:18-alpine
    environment:
      POSTGRES_USER: gateway
      POSTGRES_PASSWORD: gateway
      POSTGRES_DB: gateway
    volumes:
      - postgres_data:/var/lib/postgresql
    ports:
      - "6432:5432" # exposed for local tooling (psql, Postico, etc.)
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 256M
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gateway -d gateway"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Redis ─────────────────────────────────────────────────────────────────────
  redis:
    profiles: ["infra"]
    image: redis:8-alpine
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379" # exposed for local tooling
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 256M
        reservations:
          cpus: "0.25"
          memory: 128M
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── ClickHouse ────────────────────────────────────────────────────────────────
  clickhouse:
    profiles: ["infra"]
    image: clickhouse/clickhouse-server:25.12
    environment:
      CLICKHOUSE_DB: otel
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: otel
    ports:
      - "8123:8123" # HTTP interface — admin API queries here
      - "9001:9000" # Native protocol — otelcol writes here
    volumes:
      - clickhouse_data:/var/lib/clickhouse
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 2G
        reservations:
          cpus: "0.25"
          memory: 512M
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "clickhouse-client --user default --password otel --query 'SELECT 1'",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── OTel Collector ────────────────────────────────────────────────────────────
  otel-collector:
    profiles: ["infra"]
    image: otel/opentelemetry-collector-contrib:0.150.1
    command: ["--config=/etc/otel/config.yaml"]
    volumes:
      - ./otel-collector.yaml:/etc/otel/config.yaml:ro
    ports:
      - "4317:4317" # OTLP gRPC — gateway exports here
      - "4318:4318" # OTLP HTTP
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 256M
    depends_on:
      jaeger:
        condition: service_started
      clickhouse:
        condition: service_healthy
    restart: unless-stopped

  # ── Docs (VitePress dev server) ──────────────────────────────────────────────
  docs:
    profiles: ["backend"]
    image: node:22-alpine
    working_dir: /docs
    command: sh -c "corepack enable && pnpm install --frozen-lockfile && pnpm dev --host 0.0.0.0"
    ports:
      - "5173:5173"
    volumes:
      - ../../docs:/docs
      - docs_node_modules:/docs/node_modules
    environment:
      - NODE_ENV=development
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 256M
    restart: unless-stopped

  # ── Jaeger (local dev trace UI) ───────────────────────────────────────────────
  jaeger:
    profiles: ["infra"]
    image: cr.jaegertracing.io/jaegertracing/jaeger:2.17.0
    environment:
      SPAN_STORAGE_TYPE: badger
      BADGER_EPHEMERAL: "false"
      BADGER_DIRECTORY_VALUE: /badger/data
      BADGER_DIRECTORY_KEY: /badger/key
      BADGER_SPAN_STORE_TTL: "24h"
    ports:
      - "16686:16686" # Jaeger UI — open http://localhost:16686
    volumes:
      - jaeger_data:/badger
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 512M
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  jaeger_data:
  clickhouse_data:
  docs_node_modules:

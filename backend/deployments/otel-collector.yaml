receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch:
    timeout: 5s
    send_batch_size: 512
  # Drops noisy health-check spans before they reach Jaeger
  filter/health:
    traces:
      span:
        - 'attributes["http.target"] == "/health"'
        - 'attributes["http.target"] == "/ready"'

exporters:
  # Jaeger for local dev — swap for your observability stack in production
  otlp/jaeger:
    endpoint: jaeger:14250
    tls:
      insecure: true
  # Logs spans to collector stdout at debug level — handy during development
  debug:
    verbosity: basic

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [batch, filter/health]
      exporters: [otlp/jaeger, debug]

server {
    listen 80;
    server_name _;

    # ── OpenAI-compatible proxy ──────────────────────────────────────────────
    location /v1/ {
        proxy_pass         http://gateway:8080;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        # Keep connection open for SSE / streaming responses
        proxy_set_header   Connection        '';
        proxy_read_timeout 300s;
        proxy_buffering    off;
        chunked_transfer_encoding on;
    }

    # ── Admin API (dashboard backend) ────────────────────────────────────────
    location /api/ {
        proxy_pass         http://gateway:8081/api/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # ── Docs (VitePress static site) ───────────────────────────────────────
    location /docs/ {
        rewrite          ^/docs/(.*)$  /$1  break;
        proxy_pass       http://docs:80;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── Frontend SPA ─────────────────────────────────────────────────────────
    location / {
        root  /usr/share/nginx/html;
        index index.html;

        # Immutable cache for hashed assets
        location ~* \.(js|css|woff2?|ttf|eot|ico|svg|png|jpg|jpeg|gif)$ {
            expires    1y;
            add_header Cache-Control "public, immutable";
        }

        # SPA fallback — all unknown paths serve index.html
        try_files $uri $uri/ /index.html;
    }
}
